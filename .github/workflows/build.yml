name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gradle

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.5

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Download and bundle Vosk model
        run: |
          echo "Downloading Vosk small English model..."
          MODEL_DIR="app/src/main/assets/vosk-model-small-en-us-0.15"
          mkdir -p "$MODEL_DIR"
          curl -L --connect-timeout 30 --max-time 300 \
            "https://alphacephei.com/vosk/models/vosk-model-small-en-us-0.15.zip" \
            -o /tmp/model.zip
          echo "Extracting model..."
          unzip -q /tmp/model.zip -d /tmp/model-extract
          # The zip contains a top-level folder; move contents
          if [ -d "/tmp/model-extract/vosk-model-small-en-us-0.15" ]; then
            mv /tmp/model-extract/vosk-model-small-en-us-0.15/* "$MODEL_DIR/"
          else
            mv /tmp/model-extract/* "$MODEL_DIR/"
          fi
          rm -rf /tmp/model.zip /tmp/model-extract
          echo "Model bundled. Size: $(du -sh $MODEL_DIR | cut -f1)"

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: STP-apk-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: STP-apk-release-unsigned
          path: app/build/outputs/apk/release/*.apk